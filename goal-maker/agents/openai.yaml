interface:
  display_name: "Goal Maker"
  short_description: "Prepare a rolling Scout/Judge/Worker task board for long-running Codex goals."
  default_prompt: "Use goal-maker to prepare or repair goal.md, state.yaml, and notes/ with a charter, role-tagged task board, one active task, and task receipts. Print the /goal Follow command instead of starting /goal automatically."
policy:
  allow_implicit_invocation: true

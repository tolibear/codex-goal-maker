id: publish-github-projects
name: GitHub Projects publishing
kind: integration
version: 0.1.0
source_of_truth: local
description: Publish a one-way GitHub Projects board view from Goal Maker state while keeping state.yaml authoritative.
use_when:
  - A user asks to actively track a Goal Maker run in GitHub Projects.
  - A long-running goal needs a human-visible external board while agents keep state.yaml authoritative.
  - Goal Maker task status should mirror to Todo, In Progress, Blocked, and Done columns.
activation: publish_board
outputs:
  - GitHub Projects board view
requires_approval: true
safe_by_default: false
reads:
  - docs/goals/<slug>/goal.md
  - docs/goals/<slug>/state.yaml
  - gh auth status
  - GitHub owner and repository
writes:
  - GitHub Project
  - docs/goals/<slug>/state.yaml receipt with project and item ids
side_effects:
  - creates or updates GitHub Projects when explicitly approved
auth:
  env: []
supports:
  dry_run: true
  live_github_projects: true
  credentials_required: true
  required_gh_scopes:
    - project

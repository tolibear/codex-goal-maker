<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Goal Buddy social image</title>
  <desc id="desc">Goal Buddy brand card with a terminal preview and mascot.</desc>
  <defs>
    <radialGradient id="bgMint" cx="8%" cy="8%" r="70%">
      <stop offset="0" stop-color="#d8f8ef"/>
      <stop offset=".48" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </radialGradient>
    <radialGradient id="bgBlue" cx="88%" cy="18%" r="72%">
      <stop offset="0" stop-color="#dfe8ff"/>
      <stop offset=".62" stop-color="#ffffff" stop-opacity=".35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="darkButton" x1="0" x2="1">
      <stop offset="0" stop-color="#07101f"/>
      <stop offset=".62" stop-color="#1b2550"/>
      <stop offset="1" stop-color="#6252f3"/>
    </linearGradient>
    <radialGradient id="cloud" cx="34%" cy="18%" r="82%">
      <stop offset="0" stop-color="#f9f2ff"/>
      <stop offset=".44" stop-color="#c9bcff"/>
      <stop offset="1" stop-color="#5364f4"/>
    </radialGradient>
    <linearGradient id="pencil" x1="0" x2="1">
      <stop offset="0" stop-color="#2435d8"/>
      <stop offset="1" stop-color="#736bff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#1e2a50" flood-opacity=".16"/>
    </filter>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0v72" fill="none" stroke="#091128" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bgMint)"/>
  <rect width="1200" height="630" fill="url(#bgBlue)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity=".55"/>
  <circle cx="1040" cy="525" r="230" fill="#ffe4ef" opacity=".48"/>

  <g transform="translate(72 58)">
    <g transform="translate(0 -14) scale(.15)" filter="url(#softShadow)">
      <path d="M150 345c-42 0-76-34-76-76 0-37 26-68 61-75 8-59 59-104 120-104 13 0 25 2 36 6 32-47 85-77 145-77 88 0 161 64 174 148 45 21 76 66 76 119 0 72-58 130-130 130H208c-22 0-42-7-58-21z" fill="url(#cloud)"/>
      <ellipse cx="332" cy="254" rx="25" ry="37" fill="#07101f"/>
      <ellipse cx="474" cy="254" rx="25" ry="37" fill="#07101f"/>
      <circle cx="342" cy="240" r="8" fill="#fff"/>
      <circle cx="484" cy="240" r="8" fill="#fff"/>
      <path d="M382 311c18 18 45 18 63 0" fill="none" stroke="#07101f" stroke-width="16" stroke-linecap="round"/>
      <ellipse cx="278" cy="314" rx="27" ry="16" fill="#ffaec4" opacity=".9"/>
      <ellipse cx="529" cy="314" rx="27" ry="16" fill="#ffaec4" opacity=".9"/>
    </g>
    <text x="108" y="27" fill="#091128" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="31" font-weight="850">Goal Buddy</text>
  </g>

  <text x="76" y="166" fill="#4f46d8" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="17" font-weight="850">OPEN SOURCE CODEX /GOAL COMPANION</text>
  <text x="76" y="248" fill="#091128" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="64" font-weight="900">Give /goal a</text>
  <text x="76" y="322" fill="#091128" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="64" font-weight="900">best friend.</text>
  <text x="80" y="408" fill="#45516f" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="23" font-weight="500">Prepare goal.md for Codex /goal.</text>
  <text x="80" y="442" fill="#45516f" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="23" font-weight="500">Keep state.yaml local and extensible.</text>
  <rect x="80" y="522" width="260" height="58" rx="29" fill="url(#darkButton)"/>
  <text x="123" y="558" fill="#ffffff" font-family="Geist Mono, Menlo, monospace" font-size="20" font-weight="700">npx goalbuddy</text>

  <g filter="url(#softShadow)" transform="translate(742 118)">
    <rect width="390" height="278" rx="24" fill="#07101f"/>
    <rect width="390" height="52" rx="24" fill="#131d31"/>
    <circle cx="32" cy="26" r="7" fill="#ff6b66"/>
    <circle cx="55" cy="26" r="7" fill="#ffc45b"/>
    <circle cx="78" cy="26" r="7" fill="#58d878"/>
    <text x="34" y="100" fill="#f6f8ff" font-family="Geist Mono, Menlo, monospace" font-size="17" font-weight="600">$ npx goalbuddy</text>
    <text x="34" y="139" fill="#78f29a" font-family="Geist Mono, Menlo, monospace" font-size="17" font-weight="600">Prepared docs/goals/...</text>
    <text x="58" y="176" fill="#f6f8ff" font-family="Geist Mono, Menlo, monospace" font-size="16">goal.md</text>
    <text x="58" y="205" fill="#f6f8ff" font-family="Geist Mono, Menlo, monospace" font-size="16">state.yaml</text>
    <text x="34" y="255" fill="#9bf2c7" font-family="Geist Mono, Menlo, monospace" font-size="16" font-weight="700">Run next</text>
    <text x="126" y="255" fill="#f6f8ff" font-family="Geist Mono, Menlo, monospace" font-size="16">/goal Follow goal.md</text>
  </g>
  <g filter="url(#softShadow)" transform="translate(850 315) scale(.28)">
    <g transform="translate(-42 18) rotate(-24 155 210)">
      <rect x="132" y="70" width="70" height="270" rx="34" fill="url(#pencil)"/>
      <rect x="132" y="70" width="70" height="52" rx="24" fill="#7f77ff"/>
      <path d="M132 325h70l-35 48z" fill="#27335e"/>
    </g>
    <path d="M150 345c-42 0-76-34-76-76 0-37 26-68 61-75 8-59 59-104 120-104 13 0 25 2 36 6 32-47 85-77 145-77 88 0 161 64 174 148 45 21 76 66 76 119 0 72-58 130-130 130H208c-22 0-42-7-58-21z" fill="url(#cloud)"/>
    <ellipse cx="332" cy="254" rx="25" ry="37" fill="#07101f"/>
    <ellipse cx="474" cy="254" rx="25" ry="37" fill="#07101f"/>
    <circle cx="342" cy="240" r="8" fill="#fff"/>
    <circle cx="484" cy="240" r="8" fill="#fff"/>
    <path d="M382 311c18 18 45 18 63 0" fill="none" stroke="#07101f" stroke-width="16" stroke-linecap="round"/>
    <ellipse cx="278" cy="314" rx="27" ry="16" fill="#ffaec4" opacity=".9"/>
    <ellipse cx="529" cy="314" rx="27" ry="16" fill="#ffaec4" opacity=".9"/>
    <ellipse cx="260" cy="430" rx="42" ry="34" fill="#8077ff"/>
    <ellipse cx="515" cy="430" rx="42" ry="34" fill="#8077ff"/>
  </g>

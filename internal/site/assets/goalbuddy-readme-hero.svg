<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GoalBuddy README hero</title>
  <desc id="desc">A polished GoalBuddy hero image for GitHub README.</desc>
  <defs>
    <radialGradient id="readmeBg" cx="18%" cy="12%" r="78%">
      <stop offset="0" stop-color="#f1ecff"/>
      <stop offset=".55" stop-color="#fff"/>
      <stop offset="1" stop-color="#e9fbff"/>
    </radialGradient>
    <linearGradient id="purple" x1="0" x2="1">
      <stop offset="0" stop-color="#765cff"/>
      <stop offset="1" stop-color="#563bea"/>
    </linearGradient>
    <radialGradient id="cloud" cx="35%" cy="18%" r="82%">
      <stop offset="0" stop-color="#f8f2ff"/>
      <stop offset=".45" stop-color="#c2b6ff"/>
      <stop offset="1" stop-color="#5361ff"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#172347" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#readmeBg)"/>
  <circle cx="1380" cy="690" r="360" fill="#c9fbff" opacity=".55"/>
  <circle cx="160" cy="150" r="340" fill="#ded5ff" opacity=".36"/>
  <g transform="translate(80 54)">
    <path d="M34 72c-18 0-33-15-33-33 0-16 11-29 26-32C30-4 41-13 54-13c11 0 21 6 26 15 8-5 17-8 27-8 22 0 40 16 44 38 13 7 22 20 22 36 0 22-18 40-40 40H47c-5 0-9-1-13-4z" transform="translate(0 12)" fill="url(#cloud)"/>
    <text x="188" y="86" fill="#071236" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="54" font-weight="800">GoalBuddy</text>
  </g>
  <text x="86" y="264" fill="#071236" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1">Structured progress</text>
  <text x="86" y="338" fill="#071236" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1">for Codex goals.</text>
  <text x="92" y="424" fill="#34415f" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="29" font-weight="500">A local Scout / Judge / Worker board</text>
  <text x="92" y="466" fill="#34415f" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="29" font-weight="500">with receipts, verification, and one active task.</text>
  <rect x="92" y="545" width="310" height="76" rx="16" fill="url(#purple)"/>
  <text x="136" y="594" fill="#fff" font-family="Geist Mono, Menlo, monospace" font-size="26" font-weight="700">$ npx goalbuddy</text>
  <rect x="430" y="545" width="270" height="76" rx="16" fill="#fff" stroke="#dfe5f2" stroke-width="2"/>
  <text x="486" y="594" fill="#071236" font-family="Geist, Avenir Next, Arial, sans-serif" font-size="26" font-weight="800">View on GitHub</text>
  <g filter="url(#soft)" transform="translate(910 205)">
    <rect x="0" y="0" width="620" height="350" rx="18" fill="#081426"/>
    <rect x="0" y="0" width="620" height="58" rx="18" fill="#111d31"/>
    <circle cx="34" cy="29" r="8" fill="#ff6b65"/>
    <circle cx="60" cy="29" r="8" fill="#ffbd55"/>
    <circle cx="86" cy="29" r="8" fill="#48d86a"/>
    <text x="38" y="111" fill="#f7f8ff" font-family="Geist Mono, Menlo, monospace" font-size="25" font-weight="600">$ npx goalbuddy</text>
    <text x="38" y="165" fill="#75f27b" font-family="Geist Mono, Menlo, monospace" font-size="25" font-weight="600">Creating docs/goals/improve-project/</text>
    <text x="64" y="210" fill="#f7f8ff" font-family="Geist Mono, Menlo, monospace" font-size="23">- goal.md</text>
    <text x="64" y="247" fill="#f7f8ff" font-family="Geist Mono, Menlo, monospace" font-size="23">- state.yaml</text>
    <text x="38" y="306" fill="#75f27b" font-family="Geist Mono, Menlo, monospace" font-size="25" font-weight="600">Agents ready: Scout, Judge, Worker</text>
  </g>
  <g filter="url(#soft)" transform="translate(1070 455) scale(.31)">
    <path d="M224 622c-58 0-105-47-105-105 0-50 35-93 83-103 5-78 70-140 150-140 15 0 30 2 44 7 37-78 116-131 208-131 116 0 212 86 228 198 62 26 105 87 105 158 0 94-77 171-171 171H301c-25 0-50-20-77-55z" fill="url(#cloud)"/>
    <ellipse cx="433" cy="422" rx="38" ry="58" fill="#061238"/>
    <ellipse cx="610" cy="422" rx="38" ry="58" fill="#061238"/>
    <circle cx="447" cy="399" r="13" fill="#fff"/>
    <circle cx="624" cy="399" r="13" fill="#fff"/>
    <ellipse cx="342" cy="505" rx="41" ry="25" fill="#ffabc2" opacity=".86"/>
    <ellipse cx="701" cy="505" rx="41" ry="25" fill="#ffabc2" opacity=".86"/>
    <path d="M483 501c18 24 54 24 72 0" fill="none" stroke="#071238" stroke-width="18" stroke-linecap="round"/>
  </g>
</svg>

name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Verify package
        run: |
          npm run check
          npm run pack:dry-run

      - name: Publish
        run: npm publish

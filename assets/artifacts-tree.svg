<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1000 620">
  <title id="title">Clean goal folder with routed artifacts</title>
  <desc id="desc">A hand-drawn folder tree showing goal.md, state.yaml, evidence.jsonl, units, and artifacts subfolders so generated reports do not clutter the goal root.</desc>
  <rect width="1000" height="620" fill="#fff"/>
  <g fill="none" stroke="#111" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M454 55 L499 55 L508 72 L570 72 L570 126 L455 126 Z"/>
    <path d="M235 195 L281 195 L289 212 L352 212 L352 267 L236 267 Z"/>
    <path d="M440 195 L486 195 L494 212 L557 212 L557 267 L441 267 Z"/>
    <path d="M644 195 L690 195 L698 212 L761 212 L761 267 L645 267 Z"/>
    <path d="M291 379 L337 379 L345 396 L408 396 L408 450 L292 450 Z"/>
    <path d="M440 379 L486 379 L494 396 L557 396 L557 450 L441 450 Z"/>
    <path d="M589 379 L635 379 L643 396 L706 396 L706 450 L590 450 Z"/>
    <path d="M738 379 L784 379 L792 396 L855 396 L855 450 L739 450 Z"/>
    <path d="M512 126 L512 163 L291 163 L291 195"/>
    <path d="M512 163 L499 163 L499 195"/>
    <path d="M512 163 L703 163 L703 195"/>
    <path d="M499 267 L499 330 L350 330 L350 379"/>
    <path d="M499 330 L499 379"/>
    <path d="M499 330 L648 330 L648 379"/>
    <path d="M499 330 L797 330 L797 379"/>
  </g>
  <g font-family="'Bradley Hand', 'Marker Felt', 'Comic Sans MS', cursive" fill="#111">
    <text x="392" y="43" font-size="31">docs/goals/slug</text>
    <text x="205" y="308" font-size="27">root files</text>
    <text x="132" y="344" font-size="21">goal.md</text>
    <text x="132" y="374" font-size="21">state.yaml</text>
    <text x="132" y="404" font-size="21">evidence.jsonl</text>
    <text x="426" y="308" font-size="27">units</text>
    <text x="638" y="308" font-size="27">artifacts</text>
    <text x="263" y="492" font-size="24">scouts</text>
    <text x="416" y="492" font-size="24">judges</text>
    <text x="560" y="492" font-size="24">verification</text>
    <text x="717" y="492" font-size="24">completion</text>
    <text x="93" y="536" font-size="27">Keep generated reports out of the root.</text>
    <text x="93" y="572" font-size="24">Put them under artifacts/&lt;kind&gt;/ and reference them from state or evidence.</text>
  </g>
  <g fill="none" stroke="#e11" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M614 186 L624 186 L624 282 L614 282"/>
    <path d="M787 186 L777 186 L777 282 L787 282"/>
    <circle cx="720" cy="242" r="11" fill="#e11" stroke="none"/>
    <path d="M118 346 L242 346"/>
    <path d="M118 376 L260 376"/>
    <path d="M118 406 L282 406"/>
  </g>
</svg>

  <g font-family="'Bradley Hand', 'Marker Felt', 'Comic Sans MS', cursive" fill="#111">
    <text x="96" y="113" font-size="38">$ goal-maker</text>
    <text x="95" y="155" font-size="25">prepare control plane</text>
    <text x="96" y="181" font-size="25">do not auto-start /goal</text>
    <text x="407" y="91" font-size="29">docs/goals/slug</text>
    <text x="416" y="134" font-size="25">goal.md</text>
    <text x="416" y="169" font-size="25">state.yaml</text>
    <text x="416" y="204" font-size="25">units/ + artifacts/</text>
    <text x="751" y="112" font-size="31">edit goal.md</text>
    <text x="751" y="151" font-size="24">objective, assumptions,</text>
    <text x="751" y="181" font-size="24">handoff command</text>
    <text x="140" y="350" font-size="31">main thread</text>
    <text x="139" y="389" font-size="24">is the PM</text>
    <text x="139" y="420" font-size="24">owns state changes</text>
    <text x="458" y="350" font-size="23">Scout / Worker / Judge</text>
    <text x="466" y="390" font-size="23">bounded helpers</text>
    <text x="466" y="421" font-size="23">never own state truth</text>
    <text x="812" y="352" font-size="25">/goal Follow</text>
    <text x="812" y="386" font-size="18">docs/goals/slug/</text>
    <text x="812" y="414" font-size="21">goal.md</text>
  </g>
